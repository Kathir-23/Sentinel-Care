{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <meta name="description" content="Hospital Management System — Staff Sign Up" />

    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.0/jquery.min.js"
      integrity="sha256-xNzN2a4ltkB44Mc/Jz3pT4iU1cmeR0FkXs4pru/JxaQ=" crossorigin="anonymous"></script>

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous" />

    <!-- Font Awesome -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
      integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog=="
      crossorigin="anonymous" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet" />

    <title>Sign Up — Hospital Management</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', 'Lato', sans-serif;
        background-color: #045de9;
        background-image: linear-gradient(315deg, #045de9 0%, #09c6f9 74%);
        padding: 30px 15px;
      }

      /* floating alert */
      .alert-wrapper {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        width: 100%;
        max-width: 480px;
        padding: 0 15px;
      }

      .card-signup {
        width: 100%;
        max-width: 480px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.18);
        overflow: hidden;
      }

      .card-header-signup {
        background: linear-gradient(135deg, #045de9 0%, #09c6f9 100%);
        color: #fff;
        text-align: center;
        padding: 32px 30px 24px;
      }

      .card-header-signup .hospital-icon {
        font-size: 2.4rem;
        margin-bottom: 8px;
        display: block;
      }

      .card-header-signup h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 4px;
        letter-spacing: 0.5px;
      }

      .card-header-signup p {
        margin: 0;
        font-size: 0.88rem;
        opacity: 0.88;
      }

      .card-body-signup {
        padding: 28px 32px 32px;
      }

      .form-row-custom {
        display: flex;
        gap: 14px;
      }

      .form-row-custom .form-group {
        flex: 1;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: #444;
        margin-bottom: 5px;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }

      .input-icon-wrap {
        position: relative;
      }

      .input-icon-wrap .fa {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #5543ca;
        font-size: 1rem;
      }

      .form-control-custom {
        width: 100%;
        padding: 10px 12px 10px 38px;
        border: 0;
        border-bottom: 2.5px solid #5543ca;
        border-radius: 0;
        background: transparent;
        font-size: 0.96rem;
        color: #222;
        transition: border-color 0.2s;
        outline: none;
      }

      .form-control-custom:focus {
        border-bottom-color: #d100b9;
        background: rgba(213, 0, 185, 0.03);
      }

      .form-control-custom::placeholder {
        color: #bbb;
        font-size: 0.9rem;
      }

      .divider {
        border: none;
        border-top: 1px solid #eee;
        margin: 8px 0 18px;
      }

      .password-toggle {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #aaa;
        font-size: 0.9rem;
        background: none;
        border: none;
        padding: 0;
        line-height: 1;
      }

      .password-toggle:hover { color: #5543ca; }

      .btn-signup {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #045de9, #09c6f9);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
        margin-top: 6px;
      }

      .btn-signup:hover {
        opacity: 0.92;
        transform: translateY(-1px);
      }

      .btn-signup:active { transform: translateY(0); }

      .signin-link {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
        color: #555;
      }

      .signin-link a {
        color: #045de9;
        font-weight: 600;
        text-decoration: none;
      }

      .signin-link a:hover { text-decoration: underline; }

      .password-hint {
        font-size: 0.75rem;
        color: #999;
        margin-top: 4px;
      }

      @media (max-width: 480px) {
        .form-row-custom { flex-direction: column; gap: 0; }
        .card-body-signup { padding: 22px 20px 26px; }
      }
    </style>
  </head>

  <body id="signup-page">

    <!-- Flash messages -->
    {% if messages %}
    <div class="alert-wrapper" id="flash-alerts">
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
        <i class="fas {% if message.tags == 'danger' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %} mr-2"></i>
        <strong>{{ message }}</strong>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <div class="card-signup">

      <!-- Header -->
      <div class="card-header-signup">
        <span class="hospital-icon"><i class="fas fa-hospital-alt"></i></span>
        <h1>Create Staff Account</h1>
        <p>Hospital Management System</p>
      </div>

      <!-- Form Body -->
      <div class="card-body-signup">
        <form id="signup-form" action="" method="post" novalidate>
          {% csrf_token %}

          <!-- First & Last Name -->
          <div class="form-row-custom">
            <div class="form-group">
              <label for="first_name">First Name</label>
              <div class="input-icon-wrap">
                <i class="fas fa-user"></i>
                <input id="first_name" class="form-control-custom" type="text"
                  name="first_name" placeholder="John" required autocomplete="given-name" />
              </div>
            </div>
            <div class="form-group">
              <label for="last_name">Last Name</label>
              <div class="input-icon-wrap">
                <i class="fas fa-user"></i>
                <input id="last_name" class="form-control-custom" type="text"
                  name="last_name" placeholder="Doe" required autocomplete="family-name" />
              </div>
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fas fa-envelope"></i>
              <input id="email" class="form-control-custom" type="email"
                name="email" placeholder="you@hospital.com" required autocomplete="email" />
            </div>
          </div>

          <!-- Username -->
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-icon-wrap">
              <i class="fas fa-user-shield"></i>
              <input id="username" class="form-control-custom" type="text"
                name="username" placeholder="Choose a username" required autocomplete="username" />
            </div>
          </div>

          <hr class="divider" />

          <!-- Password -->
          <div class="form-group">
            <label for="password1">Password</label>
            <div class="input-icon-wrap">
              <i class="fas fa-key"></i>
              <input id="password1" class="form-control-custom" type="password"
                name="password1" placeholder="Min. 6 characters" required autocomplete="new-password" />
              <button type="button" class="password-toggle" onclick="togglePwd('password1', this)" tabindex="-1" aria-label="Show password">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <p class="password-hint">At least 6 characters.</p>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label for="password2">Confirm Password</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock"></i>
              <input id="password2" class="form-control-custom" type="password"
                name="password2" placeholder="Re-enter password" required autocomplete="new-password" />
              <button type="button" class="password-toggle" onclick="togglePwd('password2', this)" tabindex="-1" aria-label="Show confirm password">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" id="signup-btn" class="btn-signup">
            <i class="fas fa-user-plus mr-2"></i> CREATE ACCOUNT
          </button>
        </form>

        <p class="signin-link">
          Already have an account? <a href="{% url 'login' %}">Sign In</a>
        </p>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
      integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
      crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js"
      integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s"
      crossorigin="anonymous"></script>

    <script>
      // Show/hide password toggle
      function togglePwd(fieldId, btn) {
        const field = document.getElementById(fieldId);
        const icon = btn.querySelector('i');
        if (field.type === 'password') {
          field.type = 'text';
          icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          field.type = 'password';
          icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      }

      // Client-side match check before submit
      document.getElementById('signup-form').addEventListener('submit', function (e) {
        const p1 = document.getElementById('password1').value;
        const p2 = document.getElementById('password2').value;
        if (p1 !== p2) {
          e.preventDefault();
          alert('Passwords do not match. Please try again.');
          document.getElementById('password2').focus();
        }
      });

      // Auto-dismiss alerts after 5 s
      setTimeout(function () {
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(a => $(a).alert('close'));
      }, 5000);
    </script>

  </body>
</html>
